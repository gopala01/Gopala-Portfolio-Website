        <form method="post" action="../php_files/getUser.php" class="validationForm">

                <input type="text" size="32em" name="name"

                <label>Password</label><br>
                <input type="password" size="32em" name="password" 
                pattern="(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z]).{8,}" required>

                <br>
